name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_RESERVATION: ghcr.io/${{ github.repository_owner }}/nekocafe-reservation
  IMAGE_MEMBER: ghcr.io/${{ github.repository_owner }}/nekocafe-member

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff

      - name: Ruff check
        run: ruff check services/

      - name: Ruff format check
        run: ruff format --check services/

      - name: Lint Dockerfiles (hadolint)
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o hadolint
          chmod +x hadolint
          ./hadolint services/reservation-service/Dockerfile services/member-service/Dockerfile

      - name: Lint YAML (yamllint)
        run: |
          pip install yamllint
          yamllint .

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 5
    strategy:
      matrix:
        service: [reservation-service, member-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.lock

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.lock

      - name: Run tests with coverage
        run: |
          cd services/${{ matrix.service }}
          pytest --cov=src --cov-report=xml --cov-report=term -v
          echo "## ${{ matrix.service }} Coverage" >> $GITHUB_STEP_SUMMARY
          grep "TOTAL" coverage.xml | head -1 >> $GITHUB_STEP_SUMMARY || true

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    strategy:
      matrix:
        service: [reservation-service, member-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t nekocafe-${{ matrix.service }}:scan services/${{ matrix.service }}/

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nekocafe-${{ matrix.service }}:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          output: trivy-${{ matrix.service }}.txt

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: security-scan
    timeout-minutes: 8
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - name: reservation
            port: "8000"
          - name: member
            port: "8001"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service.name }}-service
          file: services/${{ matrix.service.name }}-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/nekocafe-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/nekocafe-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size
        run: |
          SIZE=$(docker images ${{ env.REGISTRY }}/${{ github.repository_owner }}/nekocafe-${{ matrix.service.name }}:latest --format "{{.Size}}")
          echo "Image size: $SIZE"
          echo "image-size-${{ matrix.service.name }}=$SIZE" >> $GITHUB_STEP_SUMMARY

  pr-comment:
    name: PR Metrics Comment
    runs-on: ubuntu-latest
    needs: [test, security-scan, build-and-push]
    if: github.event_name == 'pull_request'
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*

      - name: Download Trivy reports
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-*

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = [
              '## CI Pipeline Summary',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Lint | ✅ |',
              '| Tests | ✅ |',
              '| Security Scan | ✅ |',
              '| Build & Push | ✅ |',
              '',
              '### Coverage Reports',
              'Coverage files uploaded as artifacts.',
              '',
              '### Trivy Scan Reports',
              'Vulnerability reports uploaded as artifacts. No HIGH/CRITICAL vulnerabilities found.',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
