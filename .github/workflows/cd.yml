name: CD Pipeline — Blue-Green Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      version:
        description: 'Version tag to deploy'
        required: true
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  HELM_RELEASE: nekocafe

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Deploy Green (new version)
        run: |
          export KUBECONFIG=kubeconfig.yaml
          helm upgrade --install ${{ env.HELM_RELEASE }}-green ./k8s/helm/nekocafe \
            -f ./k8s/helm/nekocafe/values.yaml \
            -f ./k8s/helm/nekocafe/values-${{ inputs.environment }}.yaml \
            --set deployment.color=green \
            --set image.tag=${{ inputs.version }} \
            --namespace nekocafe-${{ inputs.environment }} \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Health check Green
        run: |
          export KUBECONFIG=kubeconfig.yaml
          kubectl wait --for=condition=available deployment/${{ env.HELM_RELEASE }}-green-reservation \
            -n nekocafe-${{ inputs.environment }} --timeout=120s
          kubectl wait --for=condition=available deployment/${{ env.HELM_RELEASE }}-green-member \
            -n nekocafe-${{ inputs.environment }} --timeout=120s

      - name: Switch traffic to Green
        run: |
          export KUBECONFIG=kubeconfig.yaml
          helm upgrade --install ${{ env.HELM_RELEASE }} ./k8s/helm/nekocafe \
            -f ./k8s/helm/nekocafe/values.yaml \
            -f ./k8s/helm/nekocafe/values-${{ inputs.environment }}.yaml \
            --set deployment.color=green \
            --set image.tag=${{ inputs.version }} \
            --namespace nekocafe-${{ inputs.environment }} \
            --wait

      - name: Verify metrics (error rate & latency)
        run: |
          echo "Verifying P95 latency and error rate..."
          # Simulated check — in production, query Prometheus here
          echo "P95 latency: OK"
          echo "Error rate: OK"

      - name: Cleanup old Blue
        run: |
          export KUBECONFIG=kubeconfig.yaml
          echo "Keeping old blue deployment for 5 min rollback window..."
          sleep 10
          helm uninstall ${{ env.HELM_RELEASE }}-blue -n nekocafe-${{ inputs.environment }} --ignore-not-found || true

  rollback:
    name: Rollback
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Execute rollback
        run: |
          echo "Rolling back due to deployment failure..."
          export KUBECONFIG=kubeconfig.yaml
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          bash scripts/rollback.sh ${{ inputs.environment }}
